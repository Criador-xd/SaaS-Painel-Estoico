<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Playfair+Display:wght@700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1080px;
      height: 1440px;
      overflow: hidden;
      background: #000000;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }

    .border-frame {
      position: absolute;
      top: 40px; left: 40px; right: 40px; bottom: 40px;
      border: 1px solid #C5A059;
      opacity: 0.3;
      pointer-events: none;
    }

    .hook-container {
      max-width: 920px;
      z-index: 2;
    }

    .tag {
      font-size: 24px;
      font-weight: 600;
      color: #C5A059;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 78px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 48px;
    }

    .highlight {
      color: #C5A059;
    }

    .subtitle {
      font-size: 38px;
      font-weight: 500;
      color: #CCCCCC;
      line-height: 1.5;
      max-width: 800px;
    }

    .footer {
      position: absolute;
      bottom: 80px;
      left: 80px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      color: #666666;
    }

    .brand-id {
      font-weight: 600;
      letter-spacing: 1px;
    }

    .swipe {
      position: absolute;
      bottom: 80px;
      right: 80px;
      font-size: 24px;
      color: #C5A059;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="border-frame"></div>
  
  <div class="hook-container">
    <div class="tag">Mentalidade de Elite</div>
    <h1>O luxo que as pessoas <span class="highlight">ignoram</span>, mas os ricos dominam.</h1>
    <p class="subtitle">Deslize para descobrir os 5 ativos invisíveis que constroem impérios geracionais.</p>
  </div>

  <div class="footer">
    <span class="brand-id">@vidademilionarrio</span>
  </div>

  <div class="swipe">DESLIZE →</div>
</body>
</html>
