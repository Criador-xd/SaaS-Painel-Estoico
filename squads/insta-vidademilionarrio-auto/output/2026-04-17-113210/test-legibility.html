<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=Playfair+Display:wght@700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1080px;
      height: 1440px;
      overflow: hidden;
      background: #111;
      background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop'); /* Fundo propositalmente ruidoso para teste */
      background-size: cover;
      background-position: center;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      position: relative;
    }

    /* Nova Proteção de Background */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.85) 100%);
      z-index: 1;
    }

    .hook-container {
      max-width: 920px;
      z-index: 2;
    }

    .tag {
      font-size: 24px;
      font-weight: 600;
      color: #C5A059;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 24px;
      text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 78px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 48px;
      text-shadow: 0px 4px 12px rgba(0,0,0,1); /* Proteção pesada de texto */
    }

    .highlight {
      color: #C5A059;
    }

    .subtitle {
      font-size: 38px;
      font-weight: 500;
      color: #EEEEEE;
      line-height: 1.5;
      max-width: 800px;
      text-shadow: 0px 2px 8px rgba(0,0,0,1);
    }

    .footer {
      position: absolute;
      bottom: 80px;
      left: 80px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      color: #CCCCCC;
    }

    .brand-id {
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="hook-container">
    <div class="tag">Teste de Legibilidade Upgrade</div>
    <h1>O luxo que as pessoas <span class="highlight">ignoram</span>, mas os ricos dominam.</h1>
    <p class="subtitle">Deslize para descobrir os ativos invisíveis que constroem impérios geracionais.</p>
  </div>

  <div class="footer">
    <span class="brand-id">@vidademilionarrio</span>
  </div>
</body>
</html>
