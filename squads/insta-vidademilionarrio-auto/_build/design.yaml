# Design output — generated by Design phase
# Input: discovery.yaml + research + investigation

squad:
  code: "insta-vidademilionarrio-auto"
  name: "Vida de Milionário Automática"
  description: "Squad focado em dominar o nicho de negócios/finanças via carrosséis virais e stories estratégicos."

agents:
  - id: "researcher"
    name: "Renato Raio-X"
    title: "Investigador de Tendências"
    icon: "🔍"
    execution: "subagent"
    role_summary: "Encontra pautas virais e notícias de impacto no nicho Business/Lifestyle."
    skills: ["web_search", "web_fetch"]
    tasks:
      - name: "find-and-rank-news"
        file: "tasks/find-and-rank-news.md"
        description: "Busca as 5 notícias/tendências mais quentes do dia."
    artifacts:
      operational_framework: |
        1. Buscar tendências no Google News e redes sociais usando palavras-chave do nicho.
        2. Filtrar por impacto emocional (curiosidade, medo, desejo).
        3. Classificar pautas por potencial de viralização.
        4. Entregar resumo estruturado das top 3 pautas.

  - id: "strategist"
    name: "Silvia Strategia"
    title: "Arquiteta de Narrativa"
    icon: "🧩"
    execution: "inline"
    role_summary: "Define os ângulos psicológicos e o objetivo de cada postagem."
    tasks:
      - name: "generate-angles"
        file: "tasks/generate-angles.md"
        description: "Cria 5 ângulos de abordagem para a pauta selecionada."
    artifacts:
      operational_framework: |
        1. Analisar a pauta selecionada.
        2. Gerar 5 ângulos distintos (ex: Educativo, Polêmico, Provocador, Aspiracional, Útil).
        3. Definir o CTA ideal para cada ângulo.

  - id: "copywriter"
    name: "Cadu Copy"
    title: "Mestre da Persuasão"
    icon: "✍️"
    execution: "inline"
    role_summary: "Escreve o conteúdo completo seguindo os padrões de Elite identificados."
    tasks:
      - name: "create-instagram-feed"
        file: "tasks/create-instagram-feed.md"
        description: "Escreve carrossel de 10 slides e a legenda viral."
      - name: "create-instagram-stories"
        file: "tasks/create-instagram-stories.md"
        description: "Escreve sequência de 5 stories estratégicos."

  - id: "designer"
    name: "Dante Designer"
    title: "Diretor de Arte"
    icon: "🎨"
    execution: "subagent"
    role_summary: "Define o conceito visual e os prompts baseados na identidade 'Milionário'."
    skills: ["image-creator"]
    tasks:
      - name: "design-concept"
        file: "tasks/design-concept.md"
        description: "Cria os prompts e o layout base de cada slide."

  - id: "generator"
    name: "Gabi Geradora"
    title: "Engenheira de Conteúdo"
    icon: "🛠️"
    execution: "subagent"
    role_summary: "Processa os assets e gera as imagens finais (PNG/MP4)."
    skills: ["image-creator"]

  - id: "reviewer"
    name: "Queila Qualidade"
    title: "Inspetora de Elite"
    icon: "✅"
    execution: "inline"
    role_summary: "Revisa cada detalhe para garantir o padrão 'Vida de Milionário'."
    tasks:
      - name: "review-content"
        file: "tasks/review-content.md"
        description: "Aplica checklist de qualidade e tom de voz."

  - id: "poster"
    name: "Paula Postagem"
    title: "Operadora de Distribuição"
    icon: "📱"
    execution: "subagent"
    role_summary: "Publica o conteúdo automaticamente no Instagram."
    skills: ["instagram-publisher"]

pipeline:
  - step: 1
    name: "Foco da Pesquisa"
    type: "checkpoint"
    output_file: "squads/insta-vidademilionarrio-auto/output/research-focus.md"
  - step: 2
    name: "Pesquisa de Tendências"
    type: "agent"
    agent: "researcher"
    execution: "subagent"
    input_file: "squads/insta-vidademilionarrio-auto/output/research-focus.md"
  - step: 3
    name: "Seleção de Pauta"
    type: "checkpoint"
  - step: 4
    name: "Geração de Ângulos"
    type: "agent"
    agent: "strategist"
    execution: "inline"
  - step: 5
    name: "Seleção de Ângulo"
    type: "checkpoint"
  - step: 6
    name: "Produção de Conteúdo"
    type: "agent"
    agent: "copywriter"
    execution: "inline"
    format: "instagram-feed"
  - step: 7
    name: "Aprovação de Conteúdo"
    type: "checkpoint"
  - step: 8
    name: "Geração Visual"
    type: "agent"
    agent: "designer"
    execution: "subagent"
  - step: 9
    name: "Revisão Final"
    type: "agent"
    agent: "reviewer"
    execution: "inline"
    on_reject: 6
  - step: 10
    name: "Aprovação Final"
    type: "checkpoint"
  - step: 11
    name: "Publicação"
    type: "agent"
    agent: "poster"
    execution: "subagent"

investigation:
  enriched: true
  profiles_analyzed: 3
  date: "2026-04-17"
  dir: "squads/insta-vidademilionarrio-auto/_investigations"

formats_selected:
  - "instagram-feed"
  - "instagram-stories"

best_practices_consulted:
  - "copywriting.md"
  - "instagram-feed.md"
  - "instagram-stories.md"
  - "strategist.md"
  - "image-design.md"
  - "review.md"

visual_identity:
  reference: "squads/insta-vidademilionarrio-auto/pipeline/data/template-reference.html"
  rules: "squads/insta-vidademilionarrio-auto/pipeline/data/visual-identity.md"
